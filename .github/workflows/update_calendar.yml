name: Update Venue Calendars

on:
  schedule:
    # Runs every day at 7:00 AM Chicago time (noon UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:
    # Allows you to trigger manually from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-united-center:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests icalendar pytz

      - name: Generate United Center calendar feed
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        run: |
          python generate_ics.py \
            --venue "United Center" \
            --city "Chicago" \
            --calendar-name "United Center Chicago" \
            --location "United Center, 1901 W Madison St, Chicago, IL 60612" \
            --output united_center.ics

      - name: Commit and push updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add united_center.ics
          git diff --cached --quiet || git commit -m "chore: update United Center calendar $(date -u +'%Y-%m-%d')"
          git push

  update-chicago-theatre:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests icalendar pytz

      - name: Generate Chicago Theatre calendar feed
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        run: |
          python generate_ics.py \
            --venue "Chicago Theatre" \
            --city "Chicago" \
            --calendar-name "Chicago Theatre" \
            --location "Chicago Theatre, 175 N State St, Chicago, IL 60601" \
            --output chicago_theatre.ics

      - name: Commit and push updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chicago_theatre.ics
          git diff --cached --quiet || git commit -m "chore: update Chicago Theatre calendar $(date -u +'%Y-%m-%d')"
          git push
