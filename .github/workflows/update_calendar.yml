name: Update United Center Calendar

on:
  schedule:
    # Runs every day at 7:00 AM Chicago time (noon UTC)
    - cron: "0 12 * * *"
  workflow_dispatch:
    # Allows you to trigger manually from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests icalendar pytz

      - name: Generate calendar feed
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
        run: python generate_ics.py

      - name: Commit and push updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add united_center.ics
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update calendar $(date -u +'%Y-%m-%d')"
          git push
